# ======================
# ОСНОВНЫЕ НАСТРОЙКИ САЙТА
# ======================

title: "andrei-ag :: code execution & antivirus internals"
title_separator: "|"
description: "Эмуляция кода, анализаторы, антивирусные технологии и низкоуровневое программирование"
author: "Andrei Agafonov"

# Подключаем тему Minimal Mistakes
remote_theme: "mmistakes/minimal-mistakes@4.26.2"

# ======================
# НАСТРОЙКИ МНОГОЯЗЫЧНОСТИ
# ======================

# Основной язык интерфейса (будет использоваться по умолчанию)
locale: "ru"

# Поддерживаемые языки контента
# Для создания статьи на английском используйте lang: en в frontmatter
lang:
  - "ru"
  - "en"

# ======================
# ПЛАГИНЫ MINIMAL MISTAKES
# ======================

plugins:
  - "jekyll-paginate"
  - "jekyll-sitemap"
  - "jekyll-gist"
  - "jekyll-feed"
  - "jekyll-include-cache"
  - "jekyll-redirect-from"

# ======================
# НАСТРОЙКИ ОТОБРАЖЕНИЯ
# ======================

permalink: "/:year/:month/:day/:title/"
timezone: "Europe/Moscow"

# Пагинация (обязательно для Minimal Mistakes)
paginate: 10
paginate_path: "/page:num/"

# Оглавление (TOC) для постов
toc: true
toc_sticky: true
toc_icon: "file-alt"

# Время чтения
read_time: true
words_per_minute: 200

# Комментарии (пока отключены)
comments: false

# ======================
# ВИЗУАЛЬНЫЕ НАСТРОЙКИ
# ======================

# Скин темы (внешний вид):
# "default", "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"
minimal_mistakes_skin: "default"

# Аватар автора
# Положите файл в assets/images/avatar.png
author:
  name: "Andrei Agafonov"
  avatar: "/assets/images/avatar.png"
  bio: "Исследователь антивирусных технологий, эмуляция кода, низкоуровневое программирование"
  location: "Russia"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/andrei-ag"

# Футер
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/andrei-ag"

# ======================
# ПОИСК
# ======================

# Поиск через Lunr (работает без дополнительных сервисов)
search: true
search_full_content: true

# ======================
# АНАЛИТИКА (ОПЦИОНАЛЬНО)
# ======================

# google_analytics: "UA-XXXXXXXXX-X"
# ga_tracking_id: "UA-XXXXXXXXX-X"

# ======================
# НАВИГАЦИЯ (МЕНЮ) - Minimal Mistakes Style
# ======================

# Основное меню
main:
  - title: "Главная"
    url: "/"
  - title: "Статьи"
    url: "/posts/"
  - title: "Контакты"
    url: "/contacts/"
  - title: "О блоге"
    url: "/about/"


# Social links (будут добавлены в футер)
social:
  type: "Person"
  name: "Andrei Agafonov"
  links:
    - "https://github.com/andrei-ag"

# ======================
# ПАРАМЕТРЫ Jekyll
# ======================

markdown: "kramdown"
kramdown:
  input: "GFM"
  auto_ids: true
  syntax_highlighter: "rouge"
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

highlighter: "rouge"

# ======================
# ИСКЛЮЧЕНИЯ
# ======================

exclude:
  - "Gemfile"
  - "Gemfile.lock"
  - "vendor/"
  - "README.md"
  - ".gitignore"
  - ".github/"
  - "tools/"
  - "docs/"
  - "*.sh"

# ======================
# НАСТРОЙКИ ДЛЯ SEO
# ======================

# Адрес сайта (замените после деплоя)
url: ""  # https://andrei-ag.github.io
baseurl: ""

# ======================
# КОЛЛЕКЦИИ
# ======================

collections:
  posts:
    output: true
    permalink: /:categories/:title/

# ======================
# DEFAULT FRONT MATTER
# ======================

defaults:
  # Настройки для всех страниц
  - scope:
      path: ""
    values:
      layout: "single"
      lang: "ru"
      comments: false
      share: false
  
  # Настройки для русских постов
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "single"
      toc: true
      toc_sticky: true
      read_time: true
      show_date: true
      date_format: "%d.%m.%Y"
  
  # Настройки для английских постов
  - scope:
      path: "_posts/en"
      type: "posts"
    values:
      layout: "single"
      toc: true
      toc_sticky: true
      read_time: true
      show_date: true
      date_format: "%d.%m.%Y"
  
  # Настройки для страниц
  - scope:
      path: "_pages"
      type: "pages"
    values:
      layout: "single"

# ======================
# КАТЕГОРИИ И ТЕГИ
# ======================

category_archive:
  type: "liquid"
  path: "/categories/"

tag_archive:
  type: "liquid"
  path: "/tags/"

# ======================
# ОТКЛЮЧАЕМ СТАРЫЕ НАСТРОЙКИ
# ======================

# navigation - удалено (заменено на nav_main)
# languages - удалено (используйте lang в frontmatter)
# github.is_project_page - удалено
# github_username - удалено